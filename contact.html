<form class="contact-form" action="PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE" method="POST">
  <label for="name">
    Your name
    <input id="name" name="name" type="text" autocomplete="name" required>
  </label>

  <label for="reply-email">
    Your email address
    <input id="reply-email" name="email" type="email" autocomplete="email" required>
  </label>

  <label for="enquiry-type">
    Enquiry area
    <select id="enquiry-type" name="enquiry_area" required>
      <option value="">Please select</option>
      <option value="CPD">CPD</option>
      <option value="Resources">Resources</option>
      <option value="School engagement">School engagement</option>
      <option value="Community partnership">Community partnership</option>
      <option value="Media or policy enquiry">Media or policy enquiry</option>
      <option value="Research collaboration">Research collaboration</option>
      <option value="Other">Other</option>
    </select>
  </label>

  <label for="message">
    Message
    <textarea id="message" name="message" rows="7" required></textarea>
  </label>

  <label class="visually-hidden" for="website">
    Website
    <input id="website" name="website" type="text" tabindex="-1" autocomplete="off">
  </label>

  <p class="form-help">Please do not include sensitive personal information in this form.</p>

  <button class="btn primary" type="submit">Send enquiry</button>
</form>
