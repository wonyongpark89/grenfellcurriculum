<form id="contact-form">
  <input type="text" name="_honey" style="display:none">

  <label for="name">Name:</label>
  <input type="text" id="name" name="name" required>

  <label for="email">Your Email:</label>
  <input type="email" id="email" name="email" required>

  <label for="message">Message:</label>
  <textarea id="message" name="message" required></textarea>

  <button type="submit" id="submit-btn">Send Message</button>
</form>

<div id="form-status" style="margin-top: 15px;"></div>

<script>
  const form = document.getElementById('contact-form');
  const statusDiv = document.getElementById('form-status');
  const submitBtn = document.getElementById('submit-btn');

  // Replace this string with your actual Google Script Web App URL
  const scriptURL = 'https://script.google.com/macros/s/AKfycbwErhlOfs9b_GYLO_lCjLLaoGe7cuy75gD6XkcMDixkNk0BMkssqNgtR8BKYtsplPPk/exec';

  form.addEventListener('submit', e => {
    e.preventDefault(); // Stop page refresh
    
    submitBtn.disabled = true;
    statusDiv.textContent = "Sending...";
    statusDiv.style.color = "black";

    // Send the data to Google Sheets/Script
    fetch(scriptURL, { 
        method: 'POST', 
        body: new FormData(form)
    })
    .then(response => response.json())
    .then(data => {
        if(data.result === 'success') {
            statusDiv.textContent = "Thank you! Your message has been sent.";
            statusDiv.style.color = "green";
            form.reset(); // Clear the form
        } else {
            throw new Error('Script returned an error');
        }
    })
    .catch(error => {
        console.error('Error!', error.message);
        statusDiv.textContent = "Oops! Something went wrong. Please try again.";
        statusDiv.style.color = "red";
    })
    .finally(() => {
        submitBtn.disabled = false;
    });
  });
</script>
